name: Auto Commit

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update keepalive file
        run: |
          mkdir -p .github/keepalive
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/keepalive/last_commit.txt

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive/last_commit.txt
          git diff --cached --quiet || git commit -m "chore: auto-commit keepalive"
          git push
